name: Publish WinForms Package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve build version
        id: build_version
        run: |
          $refName = "${{ github.ref_name }}"
          $isTagRef = "${{ startsWith(github.ref, 'refs/tags/v') }}" -eq 'true'

          if ($isTagRef) {
            if ($refName -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
              throw "Stable release tags must follow SemVer and look like v1.2.3. Received '$refName'."
            }

            $packageVersion = $Matches.version
          }
          else {
            $result = dotnet msbuild SaasCopilot.GUI.WinForms/SaasCopilot.GUI.WinForms.csproj -getProperty:PackageVersion
            $base = ($result | ConvertFrom-Json).Properties.PackageVersion
            $isPR = "${{ github.event_name }}" -eq 'pull_request'
            $suffix = if ($isPR) { "pr.${{ github.event.pull_request.number }}.${{ github.run_number }}" } else { "ci.${{ github.run_number }}" }
            $packageVersion = "$base-$suffix"
          }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Restore solution
        run: dotnet restore SaasCopilot.slnx

      - name: Build solution
        run: dotnet build SaasCopilot.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:GeneratePackageOnBuild=false -p:Version=${{ steps.build_version.outputs.package_version }}

      - name: Run core test suite
        run: dotnet test SaasCopilot.GUI.Core.Test/SaasCopilot.GUI.Core.Test.csproj --configuration Release --no-build

      - name: Pack WinForms package
        run: dotnet pack SaasCopilot.GUI.WinForms/SaasCopilot.GUI.WinForms.csproj --configuration Release --no-build --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.build_version.outputs.package_version }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: winforms-package
          if-no-files-found: error
          path: |
            Bin/SaasCopilot.GUI.WinForms/*.nupkg
            Bin/SaasCopilot.GUI.WinForms/*.snupkg

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "Bin/SaasCopilot.GUI.WinForms/*.nupkg" --api-key "$env:NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "Bin/SaasCopilot.GUI.WinForms/*.snupkg" --api-key "$env:NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
